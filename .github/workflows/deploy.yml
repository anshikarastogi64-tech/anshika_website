# Automatic deployment to AWS EC2 on push to main
# Required secrets: EC2_HOST, EC2_USER, SSH_PRIVATE_KEY
# Optional: EC2_APP_PATH (default: /home/ubuntu/kelly-app)

name: Deploy to EC2

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            APP_PATH="${{ secrets.EC2_APP_PATH || '/home/ubuntu/kelly-app' }}"
            cd "$APP_PATH" || exit 1
            git fetch origin
            git reset --hard origin/main
            npm ci --omit=dev
            mkdir -p logs Kelly/assets/uploads/recordings Kelly/assets/uploads/womens-day
            pm2 restart kelly-designers-vision || pm2 start ecosystem.config.cjs --env production
            pm2 save
